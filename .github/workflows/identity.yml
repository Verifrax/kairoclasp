name: Identity

on:
  push:
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify README identity (PRIM-008)
        shell: bash
        run: |
          set -euo pipefail
          test -f README.md
          head -n 1 README.md | grep -Eq "^PRIM-008$"
